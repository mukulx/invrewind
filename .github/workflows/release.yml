name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Get version from build.gradle.kts
        id: get_version
        run: |
          VERSION=$(grep '^version = ' build.gradle.kts | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
      
      - name: Check if release exists
        id: check_release
        run: |
          if gh release view v${{ steps.get_version.outputs.VERSION }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.get_version.outputs.VERSION }} already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.get_version.outputs.VERSION }} does not exist. Creating new release."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build with Gradle
        if: steps.check_release.outputs.exists == 'false'
        run: ./gradlew build --no-daemon
      
      - name: Create tag
        if: steps.check_release.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v${{ steps.get_version.outputs.VERSION }} -m "Release v${{ steps.get_version.outputs.VERSION }}"
          git push origin v${{ steps.get_version.outputs.VERSION }}
      
      - name: Create Release and Upload JAR
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: InvRewind ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## What's Changed
            
            ### Bug Fixes
            - Fixed Folia compatibility issue where UpdateChecker was using direct Bukkit scheduler calls
            - Plugin now properly loads on Folia servers without throwing UnsupportedOperationException
            
            ### Technical Details
            - Replaced `Bukkit.getScheduler()` calls with `SchedulerUtil` methods in UpdateChecker
            - Maintains full compatibility with Paper and Purpur servers
            
            **Full Changelog**: https://github.com/${{ github.repository }}/commits/v${{ steps.get_version.outputs.VERSION }}
          files: build/libs/InvRewind-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
