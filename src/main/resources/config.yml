# Time Display Settings
time:
  # Time zone for displaying backup timestamps
  # Examples: GMT, EST, PST, UTC, UTC+1, UTC-5, America/New_York, Europe/London
  # Set to 'auto' to use the server's default time zone
  zone: 'auto'
  
  # Time format for displaying backup timestamps
  # Examples:
  #   'dd/MM/yyyy HH:mm:ss' = 25/12/2024 14:30:45
  #   'MM-dd-yyyy hh:mm:ss a' = 12-25-2024 02:30:45 PM
  #   'yyyy-MM-dd HH:mm:ss z' = 2024-12-25 14:30:45 GMT
  format: 'dd/MM/yyyy hh:mm:ss a z'

